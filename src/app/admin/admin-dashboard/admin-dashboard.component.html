<div class="container mt-4">

  <!-- Title -->
  <h2 class="mb-4 fw-bold text-center">Admin Dashboard</h2>

  <!-- Stats Cards -->
  <div class="row g-4">

    <!-- Total Complaints -->
    <div class="col-md-4">
      <mat-card class="dashboard-card total">
        <mat-icon>assignment</mat-icon>
        <h3>{{stats.totalComplaints}}</h3>
        <p>Total Complaints</p>
      </mat-card>
    </div>

    <!-- Pending -->
    <div class="col-md-4">
      <mat-card class="dashboard-card pending">
        <mat-icon>hourglass_empty</mat-icon>
        <h3>{{stats.pending}}</h3>
        <p>Pending</p>
      </mat-card>
    </div>

    <!-- In Progress -->
    <div class="col-md-4">
      <mat-card class="dashboard-card progress">
        <mat-icon>autorenew</mat-icon>
        <h3>{{stats.inProgress}}</h3>
        <p>In Progress</p>
      </mat-card>
    </div>

    <!-- Resolved -->
    <div class="col-md-4">
      <mat-card class="dashboard-card resolved">
        <mat-icon>check_circle</mat-icon>
        <h3>{{stats.resolved}}</h3>
        <p>Resolved</p>
      </mat-card>
    </div>

    <!-- Rejected -->
    <div class="col-md-4">
      <mat-card class="dashboard-card rejected">
        <mat-icon>cancel</mat-icon>
        <h3>{{stats.rejected}}</h3>
        <p>Rejected</p>
      </mat-card>
    </div>

  </div>

</div>
