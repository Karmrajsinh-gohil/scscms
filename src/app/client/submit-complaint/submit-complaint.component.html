<div class="container mt-4">
  <h2 class="mb-4 text-center">Submit Civic Complaint</h2>

  <div class="card shadow p-4">
    <form (ngSubmit)="submitComplaint()">
      <div class="mb-3">
        <label class="form-label">Complaint Category</label>
        <select class="form-select" [(ngModel)]="complaint.category" name="category" required>
          <option value="">Select Category</option>
          <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Department</label>
        <select class="form-select" [(ngModel)]="complaint.department" name="department" required>
          <option value="">Select Department</option>
          <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Complaint Title</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter complaint title"
          [(ngModel)]="complaint.title"
          name="title"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Complaint Description</label>
        <textarea
          class="form-control"
          rows="4"
          placeholder="Describe the issue"
          [(ngModel)]="complaint.description"
          name="description"
          required
        ></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Location</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter complaint location"
          [(ngModel)]="complaint.location"
          name="location"
        />
      </div>

      <button class="btn btn-primary w-100" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Submitting...' : 'Submit Complaint' }}
      </button>
    </form>
  </div>
</div>
