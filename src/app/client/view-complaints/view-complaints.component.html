<!-- view-complaints.component.html -->
<div class="page-container">
  <h2>My Complaints</h2>
  <table class="complaints-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Category</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of complaints">
        <td>{{ c.id }}</td>
        <td>{{ c.category }}</td>
        <td>{{ c.status }}</td>
        <td>{{ c.date }}</td>
      </tr>
    </tbody>
  </table>
</div>
