<div class="dashboard-container" style="padding: 20px;">

  <h2>Welcome, {{userName}}</h2>

  <!-- Stats Cards -->
  <div class="stats-cards" style="display: flex; gap: 20px; flex-wrap: wrap;">
    <mat-card class="stat-card" color="primary">
      <mat-card-title>Total Complaints</mat-card-title>
      <mat-card-content>{{stats.totalComplaints}}</mat-card-content>
    </mat-card>

    <mat-card class="stat-card" color="warn">
      <mat-card-title>Pending</mat-card-title>
      <mat-card-content>{{stats.pending}}</mat-card-content>
    </mat-card>

    <mat-card class="stat-card" color="accent">
      <mat-card-title>Resolved</mat-card-title>
      <mat-card-content>{{stats.resolved}}</mat-card-content>
    </mat-card>

    <mat-card class="stat-card" color="warn">
      <mat-card-title>Rejected</mat-card-title>
      <mat-card-content>{{stats.rejected}}</mat-card-content>
    </mat-card>
  </div>

  <!-- Quick Actions Buttons -->
  <div style="margin-top: 30px; display: flex; gap: 15px;">
    <button mat-raised-button color="primary" routerLink="/submit-complaint">
      Submit Complaint
    </button>
    <button mat-raised-button color="accent" routerLink="/dashboard">
      View Complaints
    </button>
    <button mat-raised-button color="warn" routerLink="/profile">
      Profile
    </button>
  </div>

  <!-- Recent Complaints Table -->
  <div style="margin-top: 40px;">
    <h4>Recent Complaints</h4>
    <table mat-table [dataSource]="recentComplaints" class="mat-elevation-z8">

      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let complaint"> {{complaint.id}} </td>
      </ng-container>

      <!-- Category Column -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef> Category </th>
        <td mat-cell *matCellDef="let complaint"> {{complaint.category}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let complaint"> {{complaint.status}} </td>
      </ng-container>

      <!-- Date Column -->
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef> Date </th>
        <td mat-cell *matCellDef="let complaint"> {{complaint.date}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['id','category','status','date']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['id','category','status','date'];"></tr>
    </table>
  </div>

</div>
