<mat-toolbar color="primary" class="mat-elevation-z4">
  <span>{{ siteTitle }}</span>
  <span class="spacer"></span>
  <button mat-button routerLink="/login">Login</button>
  <button mat-button routerLink="/register">Register</button>
  <button mat-button routerLink="/about">About</button>
  <button mat-button routerLink="/contact">Contact</button>
</mat-toolbar>

<div class="home-hero">
  <h1>{{ siteTitle }}</h1>
  <p>{{ welcomeMessage }}</p>
  <button mat-raised-button color="accent" routerLink="/submit-complaint">Submit Complaint</button>
</div>

<div class="home-features">
  <mat-grid-list cols="3" gutterSize="16px" rowHeight="1:1" 
                 class="mat-elevation-z2" *ngIf="features.length > 0">
    <mat-grid-tile *ngFor="let feature of features">
      <mat-card class="feature-card">
        <mat-card-header>
          <mat-icon class="feature-icon">{{ feature.icon }}</mat-icon>
          <mat-card-title>{{ feature.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ feature.description }}</p>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>
  </mat-grid-list>
</div>

<mat-divider></mat-divider>

<footer class="home-footer">
  <p>&copy; 2026 SCSCMS (Smart Civic Services & Complaint Management System)</p>
</footer>
