<mat-toolbar color="primary" class="navbar mat-elevation-z6">

  <!-- Logo + Title -->
  <div class="logo-container">
    <img src="assets/images/logo.png" class="logo-img">
    <div class="title-group">
      <span class="system-title">SCSCMS</span>
      <span class="system-subtitle">
        Smart Civic Services & Complaint Management System
      </span>
    </div>
  </div>

  <span class="spacer"></span>

  <!-- Navigation Links -->
  <nav class="nav-links">
    <a mat-button routerLink="/dashboard">Dashboard</a>
    <a mat-button routerLink="/submit-complaint">Submit Complaint</a>
    <a mat-button routerLink="/view-complaints">View Complaints</a>
    <a mat-button routerLink="/profile">Profile</a>
  </nav>

  <!-- User Menu -->
  <button mat-icon-button [matMenuTriggerFor]="userMenu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>

    <button mat-menu-item routerLink="/logout">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>

</mat-toolbar>
